<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Awani ❤️</title><style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  text-align:center;
  overflow-x:hidden;
}

h1 {
  margin-top:20px;
  color:white;
}

/* Floating photos */
.gallery img {
  width:100px;
  border-radius:20px;
  position:absolute;
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0% {transform: translateY(0px);} 
  50% {transform: translateY(-20px);} 
  100% {transform: translateY(0px);} 
}

/* Cute button */
button {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-size:1rem;
  cursor:pointer;
}

/* Letter */
#letter {
  display:none;
  margin:20px;
  padding:20px;
  background:white;
  border-radius:15px;
  animation: openLetter 1s ease;
}

@keyframes openLetter {
  from {transform: scale(0);} 
  to {transform: scale(1);} 
}

/* Cake */
.cake {
  font-size:50px;
  display:none;
  animation: pop 1s ease infinite alternate;
}

@keyframes pop {
  from {transform: scale(1);} 
  to {transform: scale(1.2);} 
}

</style></head><body><h1>Happy Birthday Awani 🎂❤️</h1><button onclick="startSurprise()">Click here my love 💖</button>

<p id="message"></p><div class="cake" id="cake">🎂</div><div id="letter">
  <h3>My Letter 💌</h3>
  <p>You are the best thing that ever happened to me, Awani. I loveeee youuuu so much ❤️</p>
</div><input type="file" id="imgInput" multiple accept="image/*">
<div class="gallery" id="gallery"></div><script>
const text = "I loveeee youuuu so much Awani ❤️";
let i=0;

function typeText(){
  if(i<text.length){
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText,70);
  }
}

function startSurprise(){
  typeText();
  document.getElementById("cake").style.display="block";
  setTimeout(()=>{
    document.getElementById("letter").style.display="block";
  },2000);
}

// Floating images
const input = document.getElementById("imgInput");
input.addEventListener("change", function(){
  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";
  const files = Array.from(this.files);

  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = function(e){
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.left = Math.random()*90 + "%";
      img.style.top = Math.random()*80 + "%";
      gallery.appendChild(img);
    }
    reader.readAsDataURL(file);
  });
});
</script></body>
</html>
