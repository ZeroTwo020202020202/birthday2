<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Awani ❤️</title>
<!-- Background Music -->
<audio id="bgMusic" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio><style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  text-align:center;
  overflow-x:hidden;
}

h1 {
  margin-top:20px;
  color:white;
}

/* Floating photos */
.gallery img {
  width:100px;
  border-radius:20px;
  position:absolute;
  animation: float 6s infinite ease-in-out;
}

@keyframes float {
  0% {transform: translateY(0px);} 
  50% {transform: translateY(-20px);} 
  100% {transform: translateY(0px);} 
}

/* Cute button */
button {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-size:1rem;
  cursor:pointer;
}

/* Letter */
#letter {
  display:none;
  margin:20px;
  padding:20px;
  background:white;
  border-radius:15px;
  animation: openLetter 1s ease;
}

@keyframes openLetter {
  from {transform: scale(0);} 
  to {transform: scale(1);} 
}

/* Cake */
.cake {
  font-size:50px;
  display:none;
  animation: pop 1s ease infinite alternate;
}

@keyframes pop {
  from {transform: scale(1);} 
  to {transform: scale(1.2);} 
}

</style></head><body><h1>Happy Birthday Awani 🎂❤️</h1>
<p style="color:white; font-size:1.2rem;">Dear Awani, thank you for coming into my life and making everything so beautiful.</p>
<p style="color:white; font-size:1.2rem;">You are my happiness, my peace, and my favorite person.</p><button onclick="startSurprise(); openLoveWindow()">Click here my love 💖</button>

<p id="message" style="color:white; font-size:1.3rem; margin-top:15px;"></p><div class="cake" id="cake">🎂</div><div id="letter">
  <h3>My Letter 💌</h3>
  <p>I wish happiest birthday my cutiee patotiee 🎂❤️</p>
  <p>Your forever suar ❤️</p>
</div><input type="file" id="imgInput" multiple accept="image/*">
<div class="gallery" id="gallery"></div><script>
const text = "I loveeee youuuu so much Awani ❤️";
let i=0;

function typeText(){
  if(i<text.length){
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText,70);
  }
}

function startSurprise(){
  const music = document.getElementById('bgMusic');
  if(music){ music.play().catch(()=>{}); }
  typeText();
  document.getElementById("cake").style.display="block";
  setTimeout(()=>{
    document.getElementById("letter").style.display="block";
  },2000);
}

// Floating images
const input = document.getElementById("imgInput");
input.addEventListener("change", function(){
  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";
  const files = Array.from(this.files);

  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = function(e){
      const img = document.createElement("img");
      img.src = e.target.result;
      img.style.left = Math.random()*90 + "%";
      img.style.top = Math.random()*80 + "%";
      gallery.appendChild(img);
    }
    reader.readAsDataURL(file);
  });
});


function openLoveWindow(){
  const newWin = window.open('', '_blank');
  newWin.document.write(`
    <html>
    <head>
      <title>For You ❤️</title>
      <style>
        body{
          margin:0;
          background: linear-gradient(to right, #ff9a9e, #fad0c4);
          color:white;
          font-family: sans-serif;
          text-align:center;
          overflow:hidden;
        }
        #text{
          margin-top:40%;
          font-size:1.5rem;
        }
        .kiss{
          position:absolute;
          font-size:24px;
          animation: floatUp 4s linear infinite;
        }
        .sticker{
          position:absolute;
          font-size:30px;
          animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce{
          0%,100%{transform: translateY(0);} 
          50%{transform: translateY(-10px);} 
        }

        @keyframes floatUp{
          from{transform: translateY(100vh); opacity:1;}
          to{transform: translateY(-10vh); opacity:0;}
        }
      </style></head>
<body>
  <div id="text"></div>
  
  <!-- Your photo -->
  <img src="love.jpg" style="width:150px; border-radius:20px; margin-top:20px; box-shadow:0 4px 15px rgba(0,0,0,0.3);">
  
  <!-- Cute kitten stickers -->
  <div class="sticker" style="top:10px; left:10px;">🐱🎂</div>
  <div class="sticker" style="top:10px; right:10px;">🐱🎂</div>
  <div class="sticker" style="bottom:10px; left:10px;">🐱🎂</div>
  <div class="sticker" style="bottom:10px; right:10px;">🐱🎂</div>

  <script>
    const messages = [

"Dear Awani, thank you for coming into my life and making everything so beautiful.", "You are my happiness, my peace, and my favorite person, Awani.", "You are the reason I smile a little more every day.", "My life became magical the moment you entered it.", "I am so lucky to have you.", "Awani", "I wish you endless happiness, love, and success. 💕", "May your day be as special as you are to me.", "I just want to say... I love you so much, Awani ❤️", "You mean everything to me, and I’m really lucky to have you in my life.", "Happy birthday again meri chipkali ese hi mujshe chipki rehna heheheh muwaahhhhhh 💋" ];

let line = 0; let char = 0;

function type(){ if(line < messages.length){ const textDiv = document.getElementById('text'); if(char < messages[line].length){ textDiv.innerHTML += messages[line].charAt(char); char++; setTimeout(type,40); } else { textDiv.innerHTML += '<br><br>'; line++; char = 0; setTimeout(type,500); } } }

type();

// Highlight last line const observer = new MutationObserver(() => { const textDiv = document.getElementById('text'); const lines = textDiv.innerHTML.split('<br><br>'); if(lines.length === 11){ textDiv.innerHTML = lines.slice(0,10).join('<br><br>') + '<br><br><span style="font-size:2rem; color:#fff; text-shadow:0 0 10px #ff4d6d,0 0 20px #ff85a2;">' + lines[10] + '</span>'; } }); observer.observe(document.getElementById('text'), { childList: true, subtree: true });

function createKiss(){
      const kiss = document.createElement('div');
      kiss.className='kiss';
      kiss.innerHTML='💋';
      kiss.style.left = Math.random()*100 + 'vw';
      document.body.appendChild(kiss);
      setTimeout(()=>kiss.remove(),4000);
    }
    setInterval(createKiss,300);

    // Balloons 🎈
    function createBalloon(){
      const balloon = document.createElement('div');
      balloon.innerHTML = '🎈';
      balloon.style.position = 'absolute';
      balloon.style.fontSize = '30px';
      balloon.style.left = Math.random()*100 + 'vw';
      balloon.style.bottom = '-50px';
      balloon.style.animation = 'balloonUp 6s linear';
      document.body.appendChild(balloon);

      setTimeout(()=>balloon.remove(),6000);
    }

    setInterval(createBalloon,800);
  <\/script>
</body>
</html>

`); }

</script></body>
</html>
