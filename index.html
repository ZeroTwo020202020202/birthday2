<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>For Queen Eunice</title>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="myAudio" loop>
        <source src="aud.mp3" type="audio/mp3">
    </audio>

    <div id="click-me-overlay">
        <div class="pulsing-heart">❤️</div>
        <p>CLICK HERE</p>
    </div>

    <div id="main">
        <div class="party-sky">
            <div class="sky-background"></div>
            <div class="stars"></div>
        </div>

        <div class="animation-stage">
            <div class="cake-float">
                <div class="cake-tier c1"></div>
                <div class="cake-tier c2"></div>
                <div class="cake-tier c3"></div>
                <div class="candle"><div class="flame"></div></div>
            </div>

            <div id="code">
                <span class="queen">✨ Happy Birthday, Queen Eunice ✨</span><br><br>
                <span class="message">I hope your day is as amazing as you are 🍀</span><br>
                <span class="message">And filled with so much happiness 💞</span><br>
                <span class="message">I hope you have a great day today! ❤️ 💕</span>
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script src="jquery.min.js"></script>
    <script src="jscex.min.js"></script>
    <script src="jscex-parser.js"></script>
    <script src="jscex-jit.js"></script>
    <script src="jscex-builderbase.min.js"></script>
    <script src="jscex-async.min.js"></script>
    <script src="jscex-async-powerpack.min.js"></script>
    <script src="functions.js" charset="utf-8"></script>
    <script src="love.js" charset="utf-8"></script>

    <script>
    (function() {
        var canvas = $('#canvas');
        var width = $(window).width();
        var height = $(window).height();
        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: { x: width / 2 - 20, color: "rgb(190, 26, 37)", scale: 2 },
            branch: [ [535, 680, 570, 250, 500, 200, 30, 100, [ [540, 500, 455, 417, 340, 400, 13, 100, [ [450, 435, 434, 430, 394, 395, 2, 40] ] ], [550, 445, 600, 356, 680, 345, 12, 100, [ [578, 400, 648, 409, 661, 426, 3, 80] ] ], [539, 281, 537, 248, 534, 217, 3, 40], [546, 397, 413, 247, 328, 244, 9, 80, [ [427, 286, 383, 253, 371, 205, 2, 40], [498, 345, 435, 315, 395, 330, 4, 60] ] ], [546, 357, 608, 252, 678, 221, 6, 100, [ [590, 293, 646, 277, 648, 271, 2, 80] ] ] ] ] ],
            bloom: { num: 700, width: 1080, height: 650 },
            footer: { width: 1200, height: 5, speed: 10 }
        };

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var hold = 1;

        // 3. UPDATED CLICK FUNCTION (Triggers audio + animation)
        $('#click-me-overlay').click(function() {
            var audio = document.getElementById("myAudio");
            if (audio) {
                audio.play().catch(function(e) { console.log("Playback failed", e); });
            }
            
            $(this).fadeOut(); 
            hold = 0;
            runAsync().start();
        });

        var runAsync = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) { $await(Jscex.Async.sleep(10)); }
            while (seed.canScale()) { seed.scale(0.95); $await(Jscex.Async.sleep(10)); }
            while (seed.canMove()) { seed.move(0, 2); $await(Jscex.Async.sleep(10)); }
            do { tree.grow(); $await(Jscex.Async.sleep(10)); } while (tree.canGrow());
            do { tree.flower(2); $await(Jscex.Async.sleep(10)); } while (tree.canFlower());
            $(".animation-stage").fadeIn(2000);
            $("#code").show().typewriter();
        }));
    })();
    </script>
</body>
</html>
